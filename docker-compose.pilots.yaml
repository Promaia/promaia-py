# Pilot compose — pulls pre-built GHCR image but bind-mounts local source tree
# so code changes take effect without rebuilding.
#
# Usage:
#   echo 'COMPOSE_FILE=docker-compose.pilots.yaml' >> .env
#   docker compose up -d
#
# The .:/app mount includes maia-data/ at /app/maia-data, so no extra
# data mounts are needed — PROMAIA_DATA_DIR=/app/maia-data resolves correctly.

services:
  maia:
    image: ghcr.io/promaia/promaia-py:latest
    entrypoint: ["sh", "-c", "if [ $# -eq 0 ]; then exec sleep infinity; else exec maia \"$@\"; fi", "--"]
    command: []
    volumes:
      - .:/app
    env_file: ./maia-data/.env
    environment:
      - PROMAIA_DATA_DIR=/app/maia-data
      - TZ=${TZ:-America/Los_Angeles}
    ports:
      - "8085:8085"
    stdin_open: true
    tty: true
    restart: unless-stopped

  maia-web:
    image: ghcr.io/promaia/promaia-py:latest
    entrypoint: ["python", "-m", "promaia.services.supervisor", "web", "--"]
    command: ["uvicorn", "promaia.web.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - .:/app
    env_file: ./maia-data/.env
    environment:
      - PROMAIA_DATA_DIR=/app/maia-data
      - TZ=${TZ:-America/Los_Angeles}
    ports:
      - "8000:8000"
    restart: unless-stopped

  maia-scheduler:
    image: ghcr.io/promaia/promaia-py:latest
    entrypoint: ["python", "-m", "promaia.services.supervisor", "scheduler", "--"]
    command: ["maia", "agent", "scheduler-start"]
    volumes:
      - .:/app
    env_file: ./maia-data/.env
    environment:
      - PROMAIA_DATA_DIR=/app/maia-data
      - TZ=${TZ:-America/Los_Angeles}
    restart: unless-stopped

  maia-calendar:
    image: ghcr.io/promaia/promaia-py:latest
    entrypoint: ["python", "-m", "promaia.services.supervisor", "calendar", "--"]
    command: ["maia", "daemon", "start", "--foreground"]
    volumes:
      - .:/app
    env_file: ./maia-data/.env
    environment:
      - PROMAIA_DATA_DIR=/app/maia-data
      - TZ=${TZ:-America/Los_Angeles}
    restart: unless-stopped

  maia-mail:
    image: ghcr.io/promaia/promaia-py:latest
    entrypoint: ["python", "-m", "promaia.services.supervisor", "mail", "--"]
    command: ["maia", "mail", "-p", "--loop", "--interval", "1800"]
    volumes:
      - .:/app
    env_file: ./maia-data/.env
    environment:
      - PROMAIA_DATA_DIR=/app/maia-data
      - TZ=${TZ:-America/Los_Angeles}
    restart: unless-stopped

  maia-slack:
    image: ghcr.io/promaia/promaia-py:latest
    entrypoint: ["python", "-m", "promaia.services.supervisor", "slack", "--"]
    command: ["python", "-m", "promaia.messaging.slack_bot"]
    volumes:
      - .:/app
    env_file: ./maia-data/.env
    environment:
      - PROMAIA_DATA_DIR=/app/maia-data
      - TZ=${TZ:-America/Los_Angeles}
    restart: unless-stopped

  maia-discord:
    image: ghcr.io/promaia/promaia-py:latest
    entrypoint: ["python", "-m", "promaia.services.supervisor", "discord", "--"]
    command: ["python", "-m", "promaia.discord_bot.bot"]
    volumes:
      - .:/app
    env_file: ./maia-data/.env
    environment:
      - PROMAIA_DATA_DIR=/app/maia-data
      - TZ=${TZ:-America/Los_Angeles}
    restart: unless-stopped
