name: Deploy to Glacier

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Glacier droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GLACIER_HOST }}
          username: root
          key: ${{ secrets.GLACIER_SSH_KEY }}
          script: |
            cd /root/promaia-py
            docker pull ghcr.io/promaia/promaia-py:latest
            docker compose down --remove-orphans --timeout 30
            docker compose up -d
            echo "Deployed $(docker inspect --format='{{.Id}}' ghcr.io/promaia/promaia-py:latest | head -c 12)"
