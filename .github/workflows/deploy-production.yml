name: Deploy to Production (Mac Mini)

on:
  workflow_run:
    workflows: ["Build and Push to GHCR"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Mac Mini
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.MAC_MINI_HOST }}
          username: ${{ secrets.MAC_MINI_USER }}
          key: ${{ secrets.MAC_MINI_SSH_KEY }}
          port: 22
          script: |
            cd ~/promaia

            # Pull latest compose file
            git pull origin main --ff-only

            # Pull the new image from GHCR (public, no auth needed)
            docker compose pull

            # Recreate containers with the new image
            docker compose up -d

            echo "Deployment complete"
            docker compose ps
