name: Deploy to Production (Mac Mini)

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy to Mac Mini
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.MAC_MINI_HOST }}
          username: ${{ secrets.MAC_MINI_USER }}
          key: ${{ secrets.MAC_MINI_SSH_KEY }}
          port: 22
          script: |
            # Navigate to promaia directory
            cd ~/promaia
            
            # Stash any local changes (shouldn't be any on production)
            git stash
            
            # Pull latest from main
            git checkout main
            git pull origin main
            
            # Activate virtual environment
            source venv/bin/activate
            
            # Install/update dependencies
            pip install -e . --quiet
            
            # Run any migrations if needed
            # python -m promaia.storage.migrations
            
            # Restart services
            # If using systemd:
            # sudo systemctl restart promaia-discord-bot
            # sudo systemctl restart promaia-scheduler
            
            # Or if using screen/tmux:
            # screen -S promaia-bot -X quit || true
            # screen -dmS promaia-bot bash -c "source venv/bin/activate && python -m promaia.discord_bot.bot"
            
            echo "✅ Deployment complete!"
            echo "📊 Git status:"
            git log -1 --oneline
