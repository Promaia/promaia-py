name: Deploy to Production (Mac Mini)

on:
  workflow_run:
    workflows: ["Build and Push to GHCR"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Mac Mini
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.MAC_MINI_HOST }}
          username: ${{ secrets.MAC_MINI_USER }}
          key: ${{ secrets.MAC_MINI_SSH_KEY }}
          port: 22
          script: |
            cd ~/promaia

            # Pull latest compose file
            git pull origin main --ff-only

            # Log in to GHCR and pull the new image
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ secrets.MAC_MINI_USER }} --password-stdin
            docker compose -f docker-compose.prod.yml pull

            # Recreate containers with the new image
            docker compose -f docker-compose.prod.yml up -d

            echo "Deployment complete"
            docker compose -f docker-compose.prod.yml ps
