name: Deploy to Koii (GHCR)

on:
  push:
    branches:
      - koii-prod
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: promaia/promaia-py

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to Koii droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.KOII_HOST }}
          username: root
          key: ${{ secrets.KOII_SSH_KEY }}
          script: |
            cd /root/promaia
            docker pull ghcr.io/promaia/promaia-py:latest
            docker compose down --remove-orphans --timeout 30
            docker compose up -d
            echo "Deployed $(docker inspect --format='{{.Id}}' ghcr.io/promaia/promaia-py:latest | head -c 12)"
