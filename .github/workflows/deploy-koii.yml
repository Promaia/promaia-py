name: Deploy to Koii

on:
  push:
    branches:
      - koii-prod
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: promaia/promaia-py

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_sha: ${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check whether image already exists for this SHA
        id: image_check
        run: |
          if docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Image for ${{ github.sha }} already in GHCR — skipping build."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.image_check.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        if: steps.image_check.outputs.exists == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Tag existing image as :latest
        if: steps.image_check.outputs.exists == 'true'
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to Koii droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.KOII_HOST }}
          username: root
          key: ${{ secrets.KOII_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /root/promaia
            docker compose down --remove-orphans || true
            docker builder prune -f
            docker image prune -a -f
            df -h /
            docker compose pull
            docker compose up -d --remove-orphans
            sleep 5
            RUNNING=$(docker compose ps --status running -q | wc -l)
            EXPECTED=$(docker compose ps -q | wc -l)
            if [ "$RUNNING" -lt "$EXPECTED" ]; then
              echo "ERROR: Only $RUNNING/$EXPECTED containers running"
              docker compose ps
              exit 1
            fi
            echo "Deployed $RUNNING containers from $(docker inspect --format='{{.Id}}' ghcr.io/promaia/promaia-py:latest | head -c 12)"
