name: Deploy to Staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      
      - name: Run basic import test
        run: |
          python -c "import promaia; print('✅ Import successful')"
      
      - name: Check for syntax errors
        run: |
          python -m py_compile promaia/**/*.py || echo "⚠️  Some files have syntax errors"
  
  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: success()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy to Staging Mac Mini
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_MAC_MINI_HOST }}
          username: ${{ secrets.MAC_MINI_USER }}
          key: ${{ secrets.MAC_MINI_SSH_KEY }}
          port: 22
          script: |
            cd ~/promaia-staging
            git stash
            git checkout staging
            git pull origin staging
            source venv/bin/activate
            pip install -e . --quiet
            echo "✅ Staging deployment complete!"
