name: Deploy to Glacier

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Glacier droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GLACIER_HOST }}
          username: root
          key: ${{ secrets.GLACIER_SSH_KEY }}
          script: |
            set -e
            cd /root/promaia-py
            docker compose pull
            docker compose up -d --force-recreate
            sleep 5
            RUNNING=$(docker compose ps --status running -q | wc -l)
            EXPECTED=$(docker compose ps -q | wc -l)
            if [ "$RUNNING" -lt "$EXPECTED" ]; then
              echo "ERROR: Only $RUNNING/$EXPECTED containers running"
              docker compose ps
              exit 1
            fi
            echo "Deployed $RUNNING containers from $(docker inspect --format='{{.Id}}' ghcr.io/promaia/promaia-py:latest | head -c 12)"
